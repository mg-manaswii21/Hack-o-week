<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tech Fest Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylep3.css">
</head>
<body>

<header>
    <h1>InnovateX Tech Fest 2026</h1>
    <p>Register Now to be a Part of Innovation & Creativity</p>
</header>

<div class="container">

    <h2>Event Registration Form</h2>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
            <label>College Name</label>
            <input type="text" placeholder="Enter your college name" required>
        </div>

        <div class="form-group">
            <label>Select Event</label>
            <select required>
                <option value="">-- Choose Event --</option>
                <option>Hackathon</option>
                <option>Robotics Competition</option>
                <option>Web Development</option>
                <option>Gaming Tournament</option>
                <option>Paper Presentation</option>
            </select>
        </div>

        <div class="form-group">
            <label>Year of Study</label>
            <select required>
                <option value="">-- Select Year --</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label>Additional Message</label>
            <textarea rows="4" placeholder="Any queries or information..."></textarea>
        </div>

        <button type="submit">Register Now</button>

    </form>

</div>

<footer>
    <p>© 2026 InnovateX Tech Fest | All Rights Reserved</p>
</footer>

</body>
</html>
